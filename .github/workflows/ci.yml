- name: Run transformation and schema tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: nba_data_platform
          POSTGRES_USER: nba_admin
          POSTGRES_PASSWORD: nba_password
        run: |
          python -m pytest tests/test_transformation.py tests/test_dataset_schema.py -v

      - name: Run API contract tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: nba_data_platform
          POSTGRES_USER: nba_admin
          POSTGRES_PASSWORD: nba_password
        run: |
          python -m pytest tests/test_api_contracts.py -v

      - name: Validate API startup
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: nba_data_platform
          POSTGRES_USER: nba_admin
          POSTGRES_PASSWORD: nba_password
        run: |
          uvicorn src.api.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/