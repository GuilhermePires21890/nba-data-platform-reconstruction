services:

  postgres:
    image: postgres:16

    container_name: nba_postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: nba_admin
      POSTGRES_PASSWORD: nba_password
      POSTGRES_DB: nba_data_platform

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:latest

    container_name: nba_metabase

    restart: unless-stopped

    ports:
      - "3001:3000"

    depends_on:
      - postgres

volumes:
  postgres_data: